<div class="card">
    <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Environment Variables</h2>
    </div>
    <div class="p-6">
        {% if success %}
        <div class="mb-4 p-3 rounded-lg bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800 text-sm text-green-700 dark:text-green-300">
            {{ success }}
        </div>
        {% endif %}
        {% if error %}
        <div class="mb-4 p-3 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-sm text-red-700 dark:text-red-300">
            {{ error }}
        </div>
        {% endif %}
        <form hx-post="/apps/{{ sd.id }}/env" hx-target="closest .card" hx-swap="outerHTML">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">.env</label>
                <textarea name="env_content" rows="15" class="w-full font-mono text-sm p-3 border rounded-md dark:bg-gray-800 dark:border-gray-600 dark:text-gray-100" placeholder="KEY=value">{{ env_content }}</textarea>
            </div>
            <div class="flex justify-end">
                <button type="submit" class="btn-ghost text-indigo-700 dark:text-indigo-400">Save Changes</button>
            </div>
        </form>
    </div>
</div>
