<div class="card">
    <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Recent Logs</h2>
        <button class="btn-ghost text-xs"
                hx-get="/apps/{{ sd.id }}/logs"
                hx-target="closest .card"
                hx-swap="outerHTML">Refresh</button>
    </div>
    <div class="p-6">
        <pre class="bg-gray-950 text-green-400 p-4 rounded-lg text-xs font-mono overflow-x-auto max-h-[500px] overflow-y-auto leading-relaxed whitespace-pre-wrap">{{ logs or 'No logs available' }}</pre>
    </div>
</div>
