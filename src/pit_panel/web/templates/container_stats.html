<div class="p-4 bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
    {% if stats %}
    <dl class="grid grid-cols-2 gap-3 text-sm">
        <div>
            <dt class="text-gray-500 dark:text-gray-400 text-xs">CPU</dt>
            <dd class="font-mono text-gray-900 dark:text-white">{{ stats.get('CPUPerc', '?') }}</dd>
        </div>
        <div>
            <dt class="text-gray-500 dark:text-gray-400 text-xs">Memory</dt>
            <dd class="font-mono text-gray-900 dark:text-white">{{ stats.get('MemUsage', '?') }}</dd>
        </div>
        <div>
            <dt class="text-gray-500 dark:text-gray-400 text-xs">Net I/O</dt>
            <dd class="font-mono text-gray-900 dark:text-white text-xs">{{ stats.get('NetIO', '?') }}</dd>
        </div>
        <div>
            <dt class="text-gray-500 dark:text-gray-400 text-xs">Block I/O</dt>
            <dd class="font-mono text-gray-900 dark:text-white text-xs">{{ stats.get('BlockIO', '?') }}</dd>
        </div>
    </dl>
    {% else %}
    <p class="text-sm text-gray-500 dark:text-gray-400">Stats not available</p>
    {% endif %}
</div>
