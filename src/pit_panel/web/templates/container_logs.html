{% extends "base.html" %}
{% block content %}
{% set title = "Container Logs - " + subdomain.subdomain %}

<div class="mb-8">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Container Logs</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 font-mono">{{ subdomain.subdomain }}.{{ subdomain.base_domain }}</p>
        </div>
        <a href="/containers" class="btn-ghost">&larr; Back to containers</a>
    </div>
</div>

<div class="card">
    <div class="p-6">
        <pre class="bg-gray-950 text-green-400 p-4 rounded-lg text-xs font-mono overflow-x-auto max-h-[600px] overflow-y-auto leading-relaxed">{{ logs }}</pre>
    </div>
</div>
{% endblock %}
