{% extends "base.html" %}
{% block content %}
{% set title = "Logs" %}

<div class="mb-6 flex items-center justify-between">
    <div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Logs</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Systemd journal and application logs</p>
    </div>
    <a href="/debug" class="btn-ghost text-xs">Debug & Diagnostics</a>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('logTabs', () => ({
            tab: 'journal'
        }));
    });
</script>
<div x-data="logTabs">
    <!-- Underline tabs -->
    <div class="flex gap-6 border-b border-gray-200 dark:border-gray-700 mb-6">
        <button @click="tab = 'journal'"
                class="pb-2.5 text-sm font-medium transition-colors duration-150 relative"
                :class="tab === 'journal' ? 'text-brand-600 dark:text-brand-400' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300'">
            Systemd Journal
            <span x-show="tab === 'journal'"
                  class="absolute bottom-0 left-0 right-0 h-0.5 bg-brand-600 dark:bg-brand-400 rounded-full"></span>
        </button>
        <button @click="tab = 'app'"
                class="pb-2.5 text-sm font-medium transition-colors duration-150 relative"
                :class="tab === 'app' ? 'text-brand-600 dark:text-brand-400' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300'">
            App Log
            <span x-show="tab === 'app'"
                  class="absolute bottom-0 left-0 right-0 h-0.5 bg-brand-600 dark:bg-brand-400 rounded-full"></span>
        </button>
    </div>

    <!-- Journal -->
    <div x-show="tab === 'journal'" x-transition:enter.duration.150ms class="card">
        <div class="px-5 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                </svg>
                <h2 class="text-sm font-semibold text-gray-900 dark:text-white">pit-panel journal</h2>
            </div>
            <div class="flex gap-2">
                <button onclick="copyLog('journal-box')" class="btn-ghost text-xs" aria-label="Copy journal log">Copy</button>
                <button hx-get="/logs/journal" hx-target="#journal-box" hx-swap="outerHTML" class="btn-ghost text-xs">Refresh</button>
                <a href="/debug/raw" class="btn-ghost text-xs">Full Report</a>
            </div>
        </div>
        <div class="p-4 bg-gray-950 rounded-b-xl max-h-[600px] overflow-y-auto">
            <pre id="journal-box" class="text-xs font-mono text-green-400 leading-relaxed whitespace-pre-wrap">{{ journal }}</pre>
        </div>
    </div>

    <!-- App log -->
    <div x-show="tab === 'app'" x-transition:enter.duration.150ms class="card">
        <div class="px-5 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026m-16.5 0a2.25 2.25 0 00-1.883 2.542l.857 6a2.25 2.25 0 002.227 1.932H19.05a2.25 2.25 0 002.227-1.932l.857-6a2.25 2.25 0 00-1.883-2.542m-16.5 0V6A2.25 2.25 0 016 3.75h3.879a1.5 1.5 0 011.06.44l2.122 2.12a1.5 1.5 0 001.06.44H18A2.25 2.25 0 0120.25 9v.776"/>
                </svg>
                <h2 class="text-sm font-semibold text-gray-900 dark:text-white">Application log</h2>
            </div>
            <div class="flex gap-2">
                <button onclick="copyLog('applog-box')" class="btn-ghost text-xs" aria-label="Copy application log">Copy</button>
                <button hx-get="/logs/applog" hx-target="#applog-box" hx-swap="outerHTML" class="btn-ghost text-xs">Refresh</button>
            </div>
        </div>
        <div class="p-4 bg-gray-950 rounded-b-xl max-h-[600px] overflow-y-auto">
            <pre id="applog-box" class="text-xs font-mono text-green-400 leading-relaxed whitespace-pre-wrap">{{ app_log }}</pre>
        </div>
    </div>
</div>

<script>
function copyLog(id) {
    const el = document.getElementById(id);
    if (!el) return;
    navigator.clipboard.writeText(el.textContent).then(() => {
        const btn = event.target;
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
    }).catch(() => {
        const range = document.createRange();
        range.selectNode(el);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
    });
}
</script>
{% endblock %}
