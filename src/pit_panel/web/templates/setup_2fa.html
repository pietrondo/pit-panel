<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pit-panel - Setup 2FA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d' }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-brand-600 rounded-2xl mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Setup Two-Factor Authentication</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Scan QR code with your authenticator app</p>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
            {% if error %}
            <div class="mb-4 p-3 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-sm text-red-700 dark:text-red-300">
                {{ error }}
            </div>
            {% endif %}

            <div class="flex justify-center mb-6">
                <img src="data:image/png;base64,{{ qr_code }}" alt="TOTP QR Code" class="w-48 h-48 rounded-lg border border-gray-200 dark:border-gray-700">
            </div>

            <div class="mb-6 p-3 bg-gray-50 dark:bg-gray-900 rounded-lg text-center">
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">Manual entry key</p>
                <code class="text-sm font-mono text-gray-900 dark:text-white select-all">{{ totp_secret }}</code>
            </div>

            <form method="POST" action="/setup-2fa">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Verification Code</label>
                    <input type="text" name="code" required autofocus
                           class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none text-center text-2xl tracking-widest"
                           placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]*">
                </div>
                <button type="submit"
                        class="w-full py-2.5 px-4 bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg text-sm transition-colors focus:ring-2 focus:ring-brand-500 focus:ring-offset-2">
                    Verify & Enable 2FA
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-gray-400 dark:text-gray-500 mt-6">pit-panel v0.1.0</p>
    </div>
</body>
</html>
